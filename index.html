<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocco 🐱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #1a1814;
      --bg-card: #242120;
      --accent: #e8a849;
      --accent-glow: rgba(232, 168, 73, 0.3);
      --text: #f5f0e8;
      --text-muted: #a89f94;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 0%, rgba(232, 168, 73, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(180, 130, 90, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(40, 35, 30, 0.5) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .card {
      background: var(--bg-card);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 
        0 4px 6px rgba(0,0,0,0.1),
        0 20px 40px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.03),
        0 0 100px var(--accent-glow);
      animation: fadeInUp 0.8s ease-out 0.2s both;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 
        0 8px 12px rgba(0,0,0,0.15),
        0 30px 60px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.05),
        0 0 150px var(--accent-glow);
    }

    .image-container {
      position: relative;
      aspect-ratio: 4/5;
      overflow: hidden;
      background: var(--bg-dark);
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease, opacity 0.3s ease;
    }

    .image-container img.loading {
      opacity: 0;
    }

    .image-container img.loaded {
      opacity: 1;
    }

    .card:hover .image-container img {
      transform: scale(1.03);
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top, 
        rgba(26, 24, 20, 0.9) 0%, 
        transparent 40%,
        transparent 60%,
        rgba(26, 24, 20, 0.4) 100%
      );
      pointer-events: none;
    }

    .refresh-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(26, 24, 20, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn:hover {
      background: rgba(232, 168, 73, 0.2);
      border-color: var(--accent);
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .refresh-btn .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .refresh-btn.loading .spinner {
      display: block;
    }

    .refresh-btn.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info {
      padding: 32px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .breed {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      background: rgba(232, 168, 73, 0.1);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid rgba(232, 168, 73, 0.2);
      transition: all 0.3s ease;
    }

    .tag:hover {
      background: rgba(232, 168, 73, 0.2);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      margin-top: 60px;
      color: var(--text-muted);
      font-size: 0.85rem;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.3s;
    }

    footer a:hover {
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .container { padding: 40px 16px; }
      .info { padding: 24px; }
      .name { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Rocco</h1>
      <p class="subtitle">The Cat Gallery</p>
    </header>

    <article class="card">
      <div class="image-container">
        <img id="cat-image" class="loading" alt="Random cat" src="">
        <div class="image-overlay"></div>
        <button class="refresh-btn" onclick="loadNewCat()">
          <span class="spinner"></span>
          <span class="btn-text">🔄 New Cat</span>
        </button>
      </div>
      <div class="info">
        <h2 class="name" id="cat-name">Rocco</h2>
        <p class="breed">A lovely random cat</p>
        <div class="tags">
          <span class="tag">🐱 Cat</span>
          <span class="tag">✨ Cute</span>
          <span class="tag" id="random-tag">🎲 Random</span>
        </div>
      </div>
    </article>

    <footer>
      <p>Powered by <a href="https://rocco-vercel.vercel.app" target="_blank" rel="noopener">Rocco API</a></p>
    </footer>
  </div>

  <script>
    const API_URL = 'https://rocco-vercel.vercel.app/cat';
    const tagOptions = ['🧡 Ginger', '🐈 Tabby', '⚫ Black', '🏴 White', '🧶 Tuxedo', '👀 Expressive', '😴 Sleepy', '🐾 Fluffy'];
    
    function getRandomTag() {
      return tagOptions[Math.floor(Math.random() * tagOptions.length)];
    }

    async function loadNewCat() {
      const btn = document.querySelector('.refresh-btn');
      const img = document.getElementById('cat-image');
      const tag = document.getElementById('random-tag');
      
      btn.classList.add('loading');
      btn.disabled = true;
      img.classList.remove('loaded');
      img.classList.add('loading');
      
      try {
        const response = await fetch(API_URL + '?t=' + Date.now(), { 
          cache: 'no-cache',
          headers: { 'Cache-Control': 'no-cache' }
        });
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        
        img.onload = () => {
          img.classList.remove('loading');
          img.classList.add('loaded');
          URL.revokeObjectURL(url);
        };
        img.onerror = () => {
          img.classList.remove('loading');
          img.src = 'https://placekitten.com/800/1000';
          img.classList.add('loaded');
        };
        img.src = url;
        
        tag.textContent = getRandomTag();
      } catch (err) {
        console.error('Failed to load cat:', err);
        img.src = 'https://placekitten.com/800/1000';
        img.classList.add('loaded');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Load initial cat
    loadNewCat();
  </script>
</body>
</html>
